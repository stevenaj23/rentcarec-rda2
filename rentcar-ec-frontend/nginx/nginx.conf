server {
    listen 80;

    # DNS interno del Container Apps Environment
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Angular/Vue SPA ───────────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        return 200 '{"gateway":"nginx","status":"ok"}';
        add_header Content-Type application/json;
    }

    # ── auth-service ──────────────────────────────────────────────────────────
    location ~ ^/api/v1/stevenariel/(auth|usuarios) {
        set $svc "rentcar-auth.internal.whiteisland-027d7f3d.canadacentral.azurecontainerapps.io";
        proxy_pass            https://$svc;
        proxy_ssl_server_name on;
        proxy_http_version    1.1;
        proxy_set_header      Connection        "";
        proxy_set_header      Host              $svc;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto https;
    }

    # ── inventario-service ────────────────────────────────────────────────────
    location ~ ^/api/v1/stevenariel/(vehiculos|marcas|modelos|categorias|extras|tipos-combustible|tipos-transmision|estados-vehiculo) {
