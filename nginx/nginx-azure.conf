upstream auth_svc          { server rentcar-auth:80; }
upstream inventario_svc    { server rentcar-inventario:80; }
upstream org_svc           { server rentcar-org:80; }
upstream operaciones_svc   { server rentcar-operaciones:80; }
upstream financiero_svc    { server rentcar-financiero:80; }
upstream mantenimiento_svc { server rentcar-mantenimiento:80; }
upstream bus_svc           { server rentcar-bus:80; }

server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        return 200 '{"gateway":"nginx","status":"ok","version":"2.0"}';
        add_header Content-Type application/json;
    }

    # ── AUTH ──────────────────────────────────────────────────
    location /api/v1/auth {
        rewrite ^/api/v1/auth(.*)$ /api/v1/stevenariel/auth$1 break;
        proxy_pass       http://auth_svc;
        proxy_set_header Host              rentcar-auth;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/usuarios {
        rewrite ^/api/v1/usuarios(.*)$ /api/v1/stevenariel/usuarios$1 break;
        proxy_pass       http://auth_svc;
        proxy_set_header Host              rentcar-auth;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── INVENTARIO ───────────────────────────────────────────
    location /api/v1/vehiculos {
        rewrite ^/api/v1/vehiculos(.*)$ /api/v1/stevenariel/vehiculos$1 break;
        proxy_pass       http://inventario_svc;
        proxy_set_header Host              rentcar-inventario;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/v1/(marcas|modelos|categorias|extras|tipos-combustible|tipos-transmision|estados-vehiculo)(/.*)?$ {
        rewrite ^/api/v1/(.*)$ /api/v1/stevenariel/$1 break;
        proxy_pass       http://inventario_svc;
        proxy_set_header Host              rentcar-inventario;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── ORG ──────────────────────────────────────────────────
    location ~ ^/api/v1/(empresas|agencias|provincias|ciudades)(/.*)?$ {
        rewrite ^/api/v1/(.*)$ /api/v1/stevenariel/$1 break;
        proxy_pass       http://org_svc;
        proxy_set_header Host              rentcar-org;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── OPERACIONES ──────────────────────────────────────────
    location /api/v1/reservas {
        rewrite ^/api/v1/reservas(.*)$ /api/v1/stevenariel/reservas$1 break;
        proxy_pass       http://operaciones_svc;
        proxy_set_header Host              rentcar-operaciones;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/alquileres {
        rewrite ^/api/v1/alquileres(.*)$ /api/v1/stevenariel/alquileres$1 break;
        proxy_pass       http://operaciones_svc;
        proxy_set_header Host              rentcar-operaciones;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/devoluciones {
        rewrite ^/api/v1/devoluciones(.*)$ /api/v1/stevenariel/devoluciones$1 break;
        proxy_pass       http://operaciones_svc;
        proxy_set_header Host              rentcar-operaciones;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/admin {
        rewrite ^/api/v1/admin(.*)$ /api/v1/stevenariel/admin$1 break;
        proxy_pass       http://operaciones_svc;
        proxy_set_header Host              rentcar-operaciones;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/v1/(seguros|tarifas|canales-venta|historial|outbox-events)(/.*)?$ {
        rewrite ^/api/v1/(.*)$ /api/v1/stevenariel/$1 break;
        proxy_pass       http://operaciones_svc;
        proxy_set_header Host              rentcar-operaciones;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── FINANCIERO ───────────────────────────────────────────
    location ~ ^/api/v1/(pagos|facturas)(/.*)?$ {
        rewrite ^/api/v1/(.*)$ /api/v1/stevenariel/$1 break;
        proxy_pass       http://financiero_svc;
        proxy_set_header Host              rentcar-financiero;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── MANTENIMIENTO ────────────────────────────────────────
    location ~ ^/api/v1/(mantenimientos|kardex|sistemas-externos)(/.*)?$ {
        rewrite ^/api/v1/(.*)$ /api/v1/stevenariel/$1 break;
        proxy_pass       http://mantenimiento_svc;
        proxy_set_header Host              rentcar-mantenimiento;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── BUS SSE stream — proxy_buffering off para que lleguen eventos al mobile ─
    location /api/v1/bus/stream {
        rewrite ^/api/v1/bus/stream$ /api/v1/stevenariel/bus/stream break;
        proxy_pass            http://bus_svc;
        proxy_set_header      Host              rentcar-bus;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        '';
        proxy_http_version    1.1;
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    86400s;
        chunked_transfer_encoding on;
        add_header            X-Accel-Buffering no;
    }

    # ── BUS (resto de rutas) ──────────────────────────────────────────────────
    location /api/v1/bus {
        rewrite ^/api/v1/bus(.*)$ /api/v1/stevenariel/bus$1 break;
        proxy_pass       http://bus_svc;
        proxy_set_header Host              rentcar-bus;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
