upstream auth_service          { server auth-service:3001; }
upstream inventario_service    { server inventario-service:3002; }
upstream org_service           { server org-service:3003; }
upstream operaciones_service   { server operaciones-service:3004; }
upstream financiero_service    { server financiero-service:3005; }
upstream mantenimiento_service { server mantenimiento-service:3006; }
upstream bus_service           { server bus-service:3007; }

server {
    listen 80;

    # ── Frontend Vue (SPA) ───────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Health del gateway ────────────────────────────────────────────────────
    location = /health {
        return 200 '{"gateway":"nginx","status":"ok","version":"2.0"}';
        add_header Content-Type application/json;
    }

    # ── auth-service ──────────────────────────────────────────────────────────
    location /api/v1/auth {
        rewrite ^/api/v1/auth(.*)$ /api/v1/stevenariel/auth$1 break;
        proxy_pass http://auth_service;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/usuarios {
        rewrite ^/api/v1/usuarios(.*)$ /api/v1/stevenariel/usuarios$1 break;
        proxy_pass http://auth_service;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── inventario-service ────────────────────────────────────────────────────
    location /api/v1/vehiculos {
        rewrite ^/api/v1/vehiculos(.*)$ /api/v1/stevenariel/vehiculos$1 break;
        proxy_pass http://inventario_service;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/v1/(marcas|modelos|categorias|extras|tipos-combustible|tipos-transmision|estados-vehiculo)(/.+)?$ {
        rewrite ^/api/v1/(.*)$ /api/v1/stevenariel/$1 break;
        proxy_pass http://inventario_service;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── org-service ───────────────────────────────────────────────────────────
    location ~ ^/api/v1/(empresas|agencias|provincias|ciudades)(/.+)?$ {
        rewrite ^/api/v1/(.*)$ /api/v1/stevenariel/$1 break;
        proxy_pass http://org_service;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── operaciones-service ───────────────────────────────────────────────────
    location /api/v1/reservas {
        rewrite ^/api/v1/reservas(.*)$ /api/v1/stevenariel/reservas$1 break;
        proxy_pass http://operaciones_service;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/alquileres {
        rewrite ^/api/v1/alquileres(.*)$ /api/v1/stevenariel/alquileres$1 break;
        proxy_pass http://operaciones_service;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/devoluciones {
        rewrite ^/api/v1/devoluciones(.*)$ /api/v1/stevenariel/devoluciones$1 break;
        proxy_pass http://operaciones_service;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/admin {
        rewrite ^/api/v1/admin(.*)$ /api/v1/stevenariel/admin$1 break;
        proxy_pass http://operaciones_service;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/v1/(seguros|tarifas|canales-venta|historial|outbox-events)(/.+)?$ {
        rewrite ^/api/v1/(.*)$ /api/v1/stevenariel/$1 break;
        proxy_pass http://operaciones_service;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── financiero-service ────────────────────────────────────────────────────
    location ~ ^/api/v1/(pagos|facturas)(/.+)?$ {
        rewrite ^/api/v1/(.*)$ /api/v1/stevenariel/$1 break;
        proxy_pass http://financiero_service;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── mantenimiento-service ─────────────────────────────────────────────────
    location ~ ^/api/v1/(mantenimientos|kardex|sistemas-externos)(/.+)?$ {
        rewrite ^/api/v1/(.*)$ /api/v1/stevenariel/$1 break;
        proxy_pass http://mantenimiento_service;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── bus-service (API Gateway / Orquestador) ───────────────────────────────
    location /api/v1/bus {
        rewrite ^/api/v1/bus(.*)$ /api/v1/stevenariel/bus$1 break;
        proxy_pass http://bus_service;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
