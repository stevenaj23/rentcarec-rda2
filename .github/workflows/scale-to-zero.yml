name: Scale-to-zero — Azure Container Apps

# Solo corre en Azure (push a master o trigger manual).
# Docker-compose local nunca toca este archivo.
on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: scale-to-zero
  cancel-in-progress: true   # si llegan dos pushes seguidos, descarta el viejo

env:
  RESOURCE_GROUP: rg-urbancar

jobs:
  scale:
    runs-on: ubuntu-latest
    steps:
      - name: Login Azure
        run: |
          az login --service-principal \
            -u "${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}" \
            -p "${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}" \
            --tenant "${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}"
          az account set --subscription "${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}"

      - name: Apply scale-to-zero a todos los servicios
        run: |
          # Servicios que pueden bajar a 0 cuando no hay tráfico
          SCALE_ZERO=(
            rentcar-inventario
            rentcar-org
            rentcar-operaciones
            rentcar-financiero
            rentcar-mantenimiento
            rentcar-gateway
          )
          for APP in "${SCALE_ZERO[@]}"; do
            echo "→ $APP: min=0 max=3"
            az containerapp update \
              --name    "$APP" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --min-replicas 0 \
              --max-replicas 3 \
              --no-wait \
            && echo "  ✓ OK" \
            || echo "  ⚠ omitido"
          done
          # auth-service: mínimo 1 réplica (evita cold-start en login)
          echo "→ rentcar-auth: min=1 max=3 (siempre activo)"
          az containerapp update \
            --name    rentcar-auth \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --min-replicas 1 \
            --max-replicas 3 \
            --no-wait \
          && echo "  ✓ OK" \
          || echo "  ⚠ omitido"
          # bus-service: mínimo 1 réplica siempre activa (mantiene conexiones SSE)
          echo "→ rentcar-bus: min=1 max=3 (SSE activo)"
          az containerapp update \
            --name    rentcar-bus \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --min-replicas 1 \
            --max-replicas 3 \
            --no-wait \
          && echo "  ✓ OK" \
          || echo "  ⚠ omitido"
          echo "Listo."
