name: Deploy rentcar-operaciones

on:
  push:
    branches: [master, main]
    paths:
      - 'operaciones-service/**'

  workflow_dispatch:

concurrency:
  group: deploy-operaciones
  cancel-in-progress: false

env:
  IMAGE_NAME: rentcar-operaciones
  CONTAINER_APP: rentcar-operaciones
  RESOURCE_GROUP: rg-urbancar
  SERVICE_DIR: operaciones-service

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login Azure
        run: |
          az login --service-principal \
            -u "${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}" \
            -p "${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}" \
            --tenant "${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}"
          az account set --subscription "${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}"

      - name: Login ACR
        run: docker login ${{ secrets.ACR_NAME }}.azurecr.io -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push
        run: |
          TAG=${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}
          docker build -f ${{ env.SERVICE_DIR }}/Dockerfile \
            -t $TAG:latest -t $TAG:${{ github.sha }} \
            ${{ env.SERVICE_DIR }}
          docker push $TAG:latest
          docker push $TAG:${{ github.sha }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --revision-suffix ${GITHUB_SHA::8} \
            --set-env-vars \
              INVENTARIO_GRPC_HOST=rentcar-inventario:5002 \
              INVENTARIO_SERVICE_URL=http://rentcar-inventario \
              ORG_GRPC_HOST=rentcar-org:5003 \
              FINANCIERO_GRPC_HOST=rentcar-financiero:5005 \
              AUTH_SERVICE_URL=http://rentcar-auth \
              BUS_SERVICE_URL=http://rentcar-bus
